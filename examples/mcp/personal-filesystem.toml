# Example MCP config snippet for personal computer assistant
# Add to ~/.grok/config.toml under [mcp_servers]

[mcp_servers.personal-filesystem]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "/home/ormus"]  # Scope to user's home/projects for safety
env = {}
enabled = true
startup_timeout_sec = 10
tool_timeout_sec = 30

